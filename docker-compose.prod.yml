# 生产编排：postgres + redis + api + web(nginx)。
# 用法：cp .env.prod.example .env.prod && docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build
name: tianji-prod

services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-tianji}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env.prod}
      POSTGRES_DB: ${POSTGRES_DB:-tianji}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tianji}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redisdata:/data

  api:
    build: ./apps/api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      ENV: production
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-tianji}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-tianji}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?set a strong secret}
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost}
      LLM_PROVIDER: ${LLM_PROVIDER:-deepseek}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY}
      SMS_PROVIDER: ${SMS_PROVIDER:-aliyun}
      MODERATION_PROVIDER: ${MODERATION_PROVIDER:-aliyun}
      PAYMENT_PROVIDER: ${PAYMENT_PROVIDER:-wechat}
      PAYMENT_NOTIFY_BASE_URL: ${PAYMENT_NOTIFY_BASE_URL}
    env_file:
      - .env.prod

  web:
    build: ./apps/web
    restart: always
    depends_on:
      - api
    ports:
      - "${WEB_PORT:-80}:80"

volumes:
  pgdata:
  redisdata:
