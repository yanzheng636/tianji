name: tianji

services:
  postgres:
    image: postgres:16-alpine
    container_name: tianji-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tianji
      POSTGRES_PASSWORD: tianji
      POSTGRES_DB: tianji
    ports:
      - "5433:5432"
    volumes:
      - tianji-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tianji -d tianji"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tianji-redis
    restart: unless-stopped
    ports:
      - "6380:6379"
    volumes:
      - tianji-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  tianji-pgdata:
  tianji-redisdata:
